<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>咖啡计算器</title>

<!-- PWA -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#F6F0E4" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="咖啡计算器" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />

<style>
  /* ── Baked theme: 焦糖金 + Sora (定稿) ── */
  :root {
    --bg:#F6F0E4; --bgWave:rgba(201,154,63,0.16);
    --card:#FFFFFF; --card-border:rgba(120,92,40,0.09);
    --ink:#221B12; --ink2:#8B7E6B; --ink3:#BDB09A;
    --gold:#C2912E; --goldDeep:#A9791F; --goldSoft:#F4E9CF; --goldTint:#FBF5E8;
    --blue:#2C6FDB; --blueSoft:#E5EEFB;
    --espresso:#603A1E; --milk:#F1E5CC; --foam:#FBF4E4;
    --track:#EFE7D6;
    --cjk:'Noto Sans SC', system-ui, sans-serif;
    --num:'Sora', system-ui, sans-serif; --numW:700;
    --radius:20px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--cjk);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    -webkit-tap-highlight-color: transparent;
  }
  #root { min-height: 100dvh; }
  .hscroll::-webkit-scrollbar { display: none; }
  .hscroll { scrollbar-width: none; }
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
  input[type="range"]::-webkit-slider-runnable-track { height: 6px; border-radius: 999px; background: var(--track); }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 26px; height: 26px; border-radius: 999px; margin-top: -10px;
    background: #fff; border: 2px solid var(--gold); box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  input[type="range"]::-moz-range-track { height: 6px; border-radius: 999px; background: var(--track); }
  input[type="range"]::-moz-range-thumb {
    width: 24px; height: 24px; border-radius: 999px; border: 2px solid var(--gold);
    background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="milk-coffee.jsx"></script>
  <script type="text/babel" src="iced-pourover.jsx"></script>
  <script type="text/babel" src="presets.jsx"></script>
  <script type="text/babel" src="app-pwa.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('SW reg failed', e); });
      });
    }
  </script>
</body>
</html>
